# Production profile (activated with SPRING_PROFILES_ACTIVE=prod)
# Database connection is supplied via environment variables by the
# Docker Compose deployment:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Schema is managed by Hibernate for now (no Flyway/Liquibase yet).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Keep SQL logging off in production.
spring.jpa.show-sql=false

server.port=8080